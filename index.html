<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Claudia Damasceno Advocacia — Direito de Família, Divórcio, Inventário e Direito Civil. Fale agora pelo WhatsApp." />
    <title>Claudia Damasceno | Links</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta property="og:title" content="Claudia Damasceno | Advocacia" />
    <meta property="og:description" content="Direito de Família, Divórcio e Direito Civil. Fale agora pelo WhatsApp." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --cream: #f5edd9;
        --crimson: #8b1a1a;
        --crimson-light: #a52020;
        --dark: #1c1008;
        --dark-light: #2e1a0a;
        --gold: #c9a96e;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { -webkit-text-size-adjust: 100%; }
      body {
        font-family: 'Inter', system-ui, sans-serif;
        background: var(--dark);
        color: var(--cream);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 64px 16px 96px;
        position: relative;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: radial-gradient(ellipse at top, #8b1a1a18 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
      }
      .wrap {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 384px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
      }

      /* Profile */
      .profile { display: flex; flex-direction: column; align-items: center; gap: 16px; text-align: center; }
      .avatar {
        width: 96px; height: 96px;
        border-radius: 50%;
        background: var(--dark-light);
        border: 2px solid rgba(201,169,110,0.35);
        display: flex; align-items: center; justify-content: center;
        overflow: hidden;
      }
      .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .name { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 500; color: var(--cream); }
      .role {
        font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
        color: var(--gold); margin-top: 6px;
      }
      .tagline { font-size: 13px; color: rgba(245,237,217,0.45); margin-top: 12px; line-height: 1.6; }

      /* Links */
      .links { width: 100%; display: flex; flex-direction: column; gap: 12px; }
      .link {
        display: flex; align-items: center; gap: 16px;
        width: 100%; padding: 16px 20px;
        text-decoration: none;
        transition: all 0.3s ease;
        background: var(--dark-light);
        border: 1px solid rgba(245,237,217,0.1);
        color: var(--cream);
      }
      .link:hover { border-color: rgba(201,169,110,0.35); transform: translateY(-1px); }
      .link.primary { background: var(--crimson); border: none; }
      .link.primary:hover { background: var(--crimson-light); }
      .link .icon { flex-shrink: 0; }
      .link .text { display: flex; flex-direction: column; min-width: 0; }
      .link .label { font-size: 14px; font-weight: 500; color: rgba(245,237,217,0.9); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .link.primary .label { color: var(--cream); }
      .link .sub { font-size: 11px; color: rgba(245,237,217,0.4); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .link.primary .sub { color: rgba(245,237,217,0.65); }
      .link .arrow { margin-left: auto; flex-shrink: 0; opacity: 0.35; }

      /* Socials */
      .socials { display: flex; align-items: center; gap: 16px; }
      .social { display: flex; flex-direction: column; align-items: center; gap: 6px; text-decoration: none; }
      .social .badge {
        width: 40px; height: 40px;
        border: 1px solid rgba(245,237,217,0.12);
        display: flex; align-items: center; justify-content: center;
        color: rgba(245,237,217,0.35);
        transition: all 0.3s ease;
      }
      .social:hover .badge { color: var(--gold); border-color: rgba(201,169,110,0.3); }
      .social .cap {
        font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
        color: rgba(245,237,217,0.25); transition: color 0.3s ease;
      }
      .social:hover .cap { color: rgba(245,237,217,0.5); }

      .disclaimer {
        font-size: 10px; color: rgba(245,237,217,0.18);
        text-align: center; max-width: 320px; line-height: 1.6;
      }

      /* Entrance animation */
      @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
      .anim { opacity: 0; animation: fadeUp 0.5s ease forwards; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="profile anim" style="animation-delay: 0s">
        <div class="avatar">
          <img src="claudia-damasceno.jpg" alt="Dra. Claudia Damasceno"
               onerror="this.style.display='none';this.nextElementSibling.style.display='block';" />
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#c9a96e" stroke-width="1" opacity="0.7" style="display:none;">
            <circle cx="12" cy="8" r="4" />
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
          </svg>
        </div>
        <div>
          <h1 class="name">Claudia Damasceno</h1>
          <p class="role">Advogada · OAB/XX 000.000</p>
          <p class="tagline">Especialista em Direito de Família,<br />Divórcio e Direito Civil</p>
        </div>
      </div>

      <nav class="links" id="links"></nav>

      <div class="socials anim" style="animation-delay: 0.9s">
        <a class="social" href="https://instagram.com/claudiadamasceno.adv" target="_blank" rel="noopener noreferrer">
          <span class="badge">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="2" y="2" width="20" height="20" rx="5" />
              <circle cx="12" cy="12" r="4" />
              <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none" />
            </svg>
          </span>
          <span class="cap">Instagram</span>
        </a>
        <a class="social" href="https://advclaudiadamasceno.com.br" target="_blank" rel="noopener noreferrer">
          <span class="badge">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <circle cx="12" cy="12" r="10" />
              <path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z" />
            </svg>
          </span>
          <span class="cap">Site</span>
        </a>
      </div>

      <p class="disclaimer anim" style="animation-delay: 1.1s">
        Este canal tem finalidade informativa e não constitui aconselhamento jurídico.
      </p>
    </div>

    <script>
      // ============================================================
      // CONFIGURAÇÃO — edite aqui para personalizar
      // ============================================================
      var WHATSAPP_NUMBER = '5533998764328'; // DDI+DDD, sem espaços

      var LINKS = [
        { label: 'Agendar Consulta', sub: 'Fale com a Dra. Claudia Damasceno', msg: 'Olá, tudo bem? Gostaria de agendar uma consulta com a Dra. Claudia Damasceno.', primary: true },
        { label: 'Divórcio', sub: 'Consensual ou litigioso', msg: 'Olá, tudo bem? Gostaria de saber sobre divórcio.' },
        { label: 'Guarda de Filhos', sub: 'Unilateral ou compartilhada', msg: 'Olá, tudo bem? Gostaria de saber sobre guarda de filhos.' },
        { label: 'Pensão Alimentícia', sub: 'Fixação, revisão ou execução', msg: 'Olá, tudo bem? Gostaria de saber sobre pensão alimentícia.' },
        { label: 'Inventário e Herança', sub: 'Extrajudicial ou judicial', msg: 'Olá, tudo bem? Gostaria de saber sobre inventário e herança.' },
        { label: 'Direito de Família', sub: 'União estável, adoção e mais', msg: 'Olá, tudo bem? Gostaria de saber sobre direito de família.' },
        { label: 'Direito Civil', sub: 'Contratos e responsabilidade civil', msg: 'Olá, tudo bem? Gostaria de saber sobre direito civil.' }

      // ============================================================

      var WA_ICON = '<svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="FILL"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>';
      var ARROW = '<svg class="arrow" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';

      var container = document.getElementById('links');
      LINKS.forEach(function (link, i) {
        var a = document.createElement('a');
        a.className = 'link anim' + (link.primary ? ' primary' : '');
        a.style.animationDelay = (0.3 + i * 0.07) + 's';
        a.href = 'https://wa.me/' + WHATSAPP_NUMBER + '?text=' + encodeURIComponent(link.msg);
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.innerHTML =
          WA_ICON.replace('FILL', link.primary ? '#fff' : '#c9a96e') +
          '<span class="text"><span class="label">' + link.label + '</span>' +
          '<span class="sub">' + link.sub + '</span></span>' + ARROW;
        container.appendChild(a);
      });
    </script>
  </body>
</html>
